ping:
  enabled: true
  count: 2
  timeout_sec: 5.0

tcp:
  enabled: true
  attempts: 3
  interval_ms: 200
  timeout_ms: 750
  concurrency: 1

throughput:
  enabled: true
  duration_sec: 2
  parallel_streams: 1
  timeout_sec: 5.0

system:
  enabled: true
  sample_interval_sec: 0.25
  process_names:
    - frps
    - frpc
    - java
    - java.exe

load_inflation:
  enabled: true
  baseline_attempts: 2
  probe_interval_ms: 200
  timeout_ms: 500
  duration_sec: 2
