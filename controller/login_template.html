<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mc-netprobe admin login</title>
  <style>
    :root {
      --bg: #edf1ea;
      --ink: #1f2b24;
      --muted: #5e6b63;
      --card: rgba(255, 255, 255, 0.9);
      --line: #c9d3cb;
      --accent: #285943;
      --danger: #8e2e26;
      --shadow: 0 18px 36px rgba(28, 42, 33, 0.09);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Aptos", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(40,89,67,0.15), transparent 26%),
        radial-gradient(circle at bottom right, rgba(142,46,38,0.12), transparent 24%),
        linear-gradient(180deg, #f8faf7 0%, var(--bg) 100%);
    }
    .card {
      width: min(100%, 460px);
      background: var(--card);
      border: 1px solid rgba(201, 211, 203, 0.95);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(12px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      font-family: "Georgia", "Times New Roman", serif;
      font-weight: 600;
    }
    p { margin: 0; line-height: 1.5; color: var(--muted); }
    form { display: grid; gap: 14px; margin-top: 20px; }
    label { display: grid; gap: 6px; font-size: 13px; color: var(--muted); }
    input, select {
      width: 100%;
      border: 1px solid #c7d0ca;
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      color: var(--ink);
      background: rgba(255,255,255,0.95);
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .lang-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    .lang-control select {
      width: auto;
      min-width: 132px;
      border-radius: 999px;
      padding: 8px 12px;
    }
    .message {
      display: none;
      border-radius: 14px;
      padding: 12px 14px;
      margin-top: 16px;
      background: #f6d7d4;
      color: var(--danger);
      white-space: pre-wrap;
    }
    .message.show { display: block; }
    button, a.button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 700;
      font: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease;
    }
    button:hover, a.button-link:hover { transform: translateY(-1px); }
    .primary { background: var(--accent); color: white; }
    .secondary { background: #e8eee8; color: var(--ink); }
  </style>
</head>
<body>
  <section class="card">
    <div class="row">
      <div>
        <h1 id="pageTitle" data-i18n="pageTitle">Admin Login</h1>
        <p id="pageDescription">
          管理页面用于节点配对、阈值调整、调度和手动运行。
        </p>
      </div>
      <label class="lang-control" for="localeSelect">
        <span data-i18n="language">Language</span>
        <select id="localeSelect" aria-label="Language">
          <option value="zh-CN">中文</option>
          <option value="en-US">English</option>
        </select>
      </label>
    </div>

    <div id="errorBox" class="message"></div>

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next_path }}">
      <label>
        <span data-i18n="username">Username</span>
        <input name="username" type="text" autocomplete="username" required>
      </label>
      <label>
        <span data-i18n="password">Password</span>
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <div class="row" style="margin-top:4px;">
        <a class="button-link secondary" href="/" data-i18n="backToPublic">Back to public board</a>
        <button class="primary" type="submit" data-i18n="signIn">Sign In</button>
      </div>
    </form>
  </section>

  <script>
    const loginErrorKey = {{ login_error_key_json }};
    const LOCALE_STORAGE_KEY = "mc-netprobe-locale";
    const translations = {
      "zh-CN": {
        documentTitle: "mc-netprobe 管理员登录",
        pageTitle: "管理员登录",
        pageDescription: "管理页面用于节点配对、阈值调整、调度和手动运行。",
        language: "语言",
        username: "用户名",
        password: "密码",
        backToPublic: "返回公开看板",
        signIn: "登录",
        invalidCredentials: "用户名或密码错误。",
      },
      "en-US": {
        documentTitle: "mc-netprobe admin login",
        pageTitle: "Admin Login",
        pageDescription: "The admin page is used for node pairing, threshold changes, scheduling, and manual runs.",
        language: "Language",
        username: "Username",
        password: "Password",
        backToPublic: "Back to Public Board",
        signIn: "Sign In",
        invalidCredentials: "Invalid username or password.",
      },
    };
    let currentLocale = detectLocale();

    function detectLocale() {
      const saved = window.localStorage.getItem(LOCALE_STORAGE_KEY);
      if (saved && translations[saved]) {
        return saved;
      }
      return navigator.language && navigator.language.toLowerCase().startsWith("zh") ? "zh-CN" : "en-US";
    }

    function t(key) {
      return translations[currentLocale][key] || translations["en-US"][key] || key;
    }

    function applyTranslations() {
      document.documentElement.lang = currentLocale;
      document.title = t("documentTitle");
      document.getElementById("pageDescription").textContent = t("pageDescription");
      document.querySelectorAll("[data-i18n]").forEach((element) => {
        element.textContent = t(element.dataset.i18n);
      });
      const errorBox = document.getElementById("errorBox");
      if (loginErrorKey) {
        errorBox.textContent = t(loginErrorKey);
        errorBox.classList.add("show");
      }
    }

    function setLocale(locale) {
      if (!translations[locale]) {
        return;
      }
      currentLocale = locale;
      window.localStorage.setItem(LOCALE_STORAGE_KEY, locale);
      document.getElementById("localeSelect").value = locale;
      applyTranslations();
    }

    document.getElementById("localeSelect").addEventListener("change", (event) => setLocale(event.target.value));
    setLocale(currentLocale);
  </script>
</body>
</html>
