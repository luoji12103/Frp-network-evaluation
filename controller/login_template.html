<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel Dashboard</title>
    {% for href in css_files %}
    <link rel="stylesheet" href="{{ href }}" />
    {% endfor %}
</head>
<body>
    <script>
        window.next_path = {{ next_path | tojson | safe }};
        window.login_error_key_json = {% if login_error_key_json %}{{ login_error_key_json | tojson | safe }}{% else %}null{% endif %};
        window.panel_build_label = "{{ panel_build_label }}";
    </script>
    <div id="root"></div>
    <script type="module" src="{{ entry_js }}"></script>
</body>
</html>
