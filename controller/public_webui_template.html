<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mc-netprobe 公开网络看板</title>
  <style>
    :root {
      --bg: #eef2eb;
      --ink: #18231d;
      --muted: #5d6b62;
      --card: rgba(255, 255, 255, 0.9);
      --line: #c9d4cb;
      --accent: #1f5a46;
      --accent-soft: #dbe8df;
      --warn: #a16617;
      --danger: #8c342c;
      --ok: #23653f;
      --shadow: 0 18px 40px rgba(24, 35, 29, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Aptos", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(31, 90, 70, 0.18), transparent 24%),
        radial-gradient(circle at bottom right, rgba(161, 102, 23, 0.14), transparent 20%),
        linear-gradient(180deg, #f8faf7 0%, var(--bg) 100%);
    }
    .shell { max-width: 1500px; margin: 0 auto; padding: 24px; display: grid; gap: 18px; }
    .panel {
      background: var(--card);
      border: 1px solid rgba(201, 212, 203, 0.95);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .hero, .grid-two, .grid-four, .grid-role, .grid-path {
      display: grid;
      gap: 16px;
    }
    .hero { grid-template-columns: 1.2fr 0.8fr; }
    .grid-two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid-role { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-path { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    h1, h2, h3 {
      margin: 0;
      font-family: "Iowan Old Style", "Georgia", serif;
      font-weight: 600;
    }
    h1 { font-size: 38px; margin-top: 8px; }
    h2 { font-size: 24px; margin-bottom: 14px; }
    h3 { font-size: 18px; margin-bottom: 10px; }
    p { margin: 0; color: var(--muted); line-height: 1.5; }
    .topline, .toolbar, .section-head, .metric-meta, .action-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pill, .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
    }
    .pill { background: var(--accent-soft); color: var(--accent); }
    .build-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
      max-width: 100%;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid var(--line);
    }
    .build-badge code {
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      color: var(--ink);
      overflow-wrap: anywhere;
    }
    .status-pill.online, .status-pill.healthy, .status-pill.ok, .status-pill.pass { background: #dcefe3; color: var(--ok); }
    .status-pill.push-only, .status-pill.degraded, .status-pill.warn { background: #fff0cc; color: var(--warn); }
    .status-pill.pull-only, .status-pill.offline, .status-pill.critical, .status-pill.unpaired, .status-pill.fail { background: #f8ddd8; color: var(--danger); }
    .status-pill.disabled, .status-pill.skip, .status-pill.unknown { background: #e8e8e8; color: #555; }
    .button, select {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      background: rgba(255, 255, 255, 0.96);
      color: var(--ink);
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    .button.primary {
      background: var(--accent);
      color: white;
      border-color: transparent;
    }
    .card {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(240,245,241,0.66));
      padding: 16px;
    }
    .card-link {
      display: block;
      color: inherit;
      text-decoration: none;
    }
    .card-link:hover {
      border-color: rgba(31, 90, 70, 0.35);
      box-shadow: 0 8px 18px rgba(24, 35, 29, 0.08);
    }
    .kpi-value {
      font-size: 32px;
      margin-top: 8px;
      font-family: "Iowan Old Style", "Georgia", serif;
    }
    .metric-meta, .list-meta { color: var(--muted); font-size: 13px; }
    .chart { width: 100%; height: 300px; }
    .list { display: grid; gap: 12px; }
    .list-item {
      border-radius: 16px;
      border: 1px solid var(--line);
      padding: 14px;
      background: rgba(255, 255, 255, 0.7);
    }
    .muted { color: var(--muted); }
    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      color: var(--muted);
      text-align: center;
    }
    .hidden { display: none !important; }
    .muted, .status-meta, p, .list-item, .card { overflow-wrap: anywhere; }
    .locale-wrap, .toolbar-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .status-meta {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 1200px) {
      .hero, .grid-two, .grid-four, .grid-role, .grid-path { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="panel">
        <div class="topline">
          <div class="pill" data-i18n="boardBadge">公开网络质量</div>
          <div class="locale-wrap">
            <div class="build-badge" title="Deployed panel build">
              <span>版本</span>
              <code>{{ panel_build_label }}</code>
            </div>
            <label for="timeRangeSelect" data-i18n="timeRange">时间范围</label>
            <select id="timeRangeSelect" aria-label="Time range">
              <option value="24h">24h</option>
              <option value="7d">7d</option>
              <option value="30d">30d</option>
            </select>
            <label for="autoRefreshSelect" data-i18n="autoRefresh">自动刷新</label>
            <select id="autoRefreshSelect" aria-label="Auto refresh"></select>
            <label for="localeSelect" data-i18n="language">语言</label>
            <select id="localeSelect" aria-label="Language">
              <option value="zh-CN">中文</option>
              <option value="en-US">English</option>
            </select>
          </div>
        </div>
        <h1 id="heroTitle" data-i18n="heroTitle">MC网络质量监测</h1>
        <p id="heroDescription" data-i18n="heroDescription">
          公开查看网络质量、角色健康、近期异常与监测趋势。内部地址、管理操作和敏感配置保持在管理员后台内。
        </p>
        <div class="toolbar" style="margin-top: 18px;">
          <div class="toolbar-group">
            <a class="button" href="/" id="homeLink" data-i18n="backToOverview">返回总览</a>
            <a class="button primary" href="/admin" data-i18n="adminLogin">管理员登录</a>
            <button class="button" type="button" id="refreshBtn" data-i18n="refreshBoard">刷新看板</button>
          </div>
          <a class="muted" id="latestReportLink" href="#" target="_blank" rel="noreferrer" data-i18n="openLatestReport">打开最新报告</a>
        </div>
        <div id="boardStatusMeta" class="status-meta"></div>
      </div>
      <div class="panel">
        <div class="section-head">
          <h2 id="summaryTitle" data-i18n="topSummary">执行摘要</h2>
          <span class="muted" id="topologyName"></span>
        </div>
        <div id="kpiGrid" class="grid-four"></div>
      </div>
    </section>

    <div id="overviewView">
      <section class="panel">
        <div class="section-head">
          <h2 data-i18n="roleHealth">角色健康</h2>
          <span class="muted" data-i18n="roleHealthHint">仅公开角色级状态，不暴露后端地址</span>
        </div>
        <div id="roleGrid" class="grid-role"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2 data-i18n="pathSummary">路径摘要</h2>
          <span class="muted" data-i18n="pathSummaryHint">聚焦延迟、丢包、抖动、吞吐与活跃告警</span>
        </div>
        <div id="pathGrid" class="grid-path"></div>
      </section>

      <section class="grid-two">
        <div class="panel">
          <h2 data-i18n="latencyTrend">延迟趋势</h2>
          <div id="latencyChart" class="chart"></div>
        </div>
        <div class="panel">
          <h2 data-i18n="jitterTrend">抖动趋势</h2>
          <div id="jitterChart" class="chart"></div>
        </div>
        <div class="panel">
          <h2 data-i18n="lossTrend">丢包趋势</h2>
          <div id="lossChart" class="chart"></div>
        </div>
        <div class="panel">
          <h2 data-i18n="throughputTrend">吞吐趋势</h2>
          <div id="throughputChart" class="chart"></div>
        </div>
        <div class="panel">
          <h2 data-i18n="loadTrend">负载趋势</h2>
          <div id="loadChart" class="chart"></div>
        </div>
        <div class="panel">
          <h2 data-i18n="systemTrend">系统趋势</h2>
          <div id="systemChart" class="chart"></div>
        </div>
      </section>

      <section class="grid-two">
        <div class="panel">
          <div class="section-head">
            <h2 data-i18n="recentAnomalies">最近异常</h2>
            <span class="muted" data-i18n="recentAnomaliesHint">仅展示阈值和离群事件</span>
          </div>
          <div id="alertsList" class="list"></div>
        </div>
        <div class="panel">
          <div class="section-head">
            <h2 data-i18n="recentRuns">最近运行</h2>
            <span class="muted" id="lastUpdated"></span>
          </div>
          <div id="runsList" class="list"></div>
        </div>
      </section>
    </div>

    <div id="detailView" class="hidden">
      <section class="panel">
        <div class="section-head">
          <h2 id="detailTitle">公开详情</h2>
          <span class="muted" id="detailSubtitle"></span>
        </div>
        <div id="detailSummaryGrid" class="grid-four"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2 data-i18n="relatedPaths">相关路径</h2>
          <span class="muted" data-i18n="relatedPathsHint">仅公开路径级状态与指标</span>
        </div>
        <div id="detailPathGrid" class="grid-path"></div>
      </section>

      <section class="grid-two" id="detailCharts"></section>

      <section class="grid-two">
        <div class="panel">
          <div class="section-head">
            <h2 data-i18n="recentAnomalies">最近异常</h2>
            <span class="muted" id="detailAlertsHint"></span>
          </div>
          <div id="detailAlertsList" class="list"></div>
        </div>
        <div class="panel">
          <div class="section-head">
            <h2 data-i18n="recentRuns">最近运行</h2>
            <span class="muted" id="detailRunsHint"></span>
          </div>
          <div id="detailRunsList" class="list"></div>
        </div>
      </section>
    </div>
  </div>

  <script>window.__INITIAL_STATE__ = {{ initial_state_json }};</script>
  <script>window.__PUBLIC_PAGE__ = {{ public_page_json }};</script>
  <script src="/assets/echarts.min.js"></script>
  <script src="/assets/public-dashboard.js"></script>
</body>
</html>
