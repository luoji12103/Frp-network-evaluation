<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mc-netprobe public board</title>
  <style>
    :root {
      --bg: #eef3ec;
      --ink: #1d2b22;
      --muted: #5e6b63;
      --card: rgba(255, 255, 255, 0.9);
      --line: #cbd6ce;
      --accent: #285943;
      --accent-soft: #dce9e1;
      --warn: #8a651d;
      --danger: #8a352d;
      --ok: #24623f;
      --shadow: 0 18px 36px rgba(28, 42, 33, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Aptos", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(40,89,67,0.14), transparent 26%),
        radial-gradient(circle at bottom right, rgba(138,101,29,0.14), transparent 24%),
        linear-gradient(180deg, #f9fbf8 0%, var(--bg) 100%);
    }
    .shell { max-width: 1400px; margin: 0 auto; padding: 24px; display: grid; gap: 18px; }
    .hero, .body-grid { display: grid; gap: 18px; }
    .hero { grid-template-columns: 1.2fr 0.8fr; }
    .body-grid { grid-template-columns: 1.05fr 0.95fr; }
    .panel {
      background: var(--card);
      border: 1px solid rgba(203, 214, 206, 0.95);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 20px;
      backdrop-filter: blur(12px);
    }
    h1, h2, h3 { margin: 0; font-family: "Georgia", "Times New Roman", serif; font-weight: 600; }
    h1 { font-size: 34px; margin-bottom: 10px; }
    h2 { font-size: 24px; margin-bottom: 14px; }
    h3 { font-size: 18px; margin-bottom: 8px; }
    p { margin: 0; line-height: 1.5; color: var(--muted); }
    a.button-link, button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 700;
      font: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease;
    }
    a.button-link:hover, button:hover { transform: translateY(-1px); }
    .primary { background: var(--accent); color: white; }
    .secondary { background: #e8eee8; color: var(--ink); }
    .hero-head, .actions, .metric-meta, .summary-grid, .cards { display: flex; flex-wrap: wrap; gap: 12px; }
    .hero-head, .split { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .cards { display: grid; }
    .cards.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cards.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .summary-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .summary-card, .node-card, .run-card, .alert-card {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(241,246,242,0.66));
      padding: 16px;
    }
    .summary-card strong {
      display: block;
      font-size: 28px;
      font-family: "Georgia", "Times New Roman", serif;
      margin-top: 8px;
    }
    .status-badge, .node-pill, .run-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      font-weight: 700;
    }
    .status-badge { background: var(--accent-soft); color: var(--accent); }
    .node-pill.online, .run-pill.completed { background: #d8eddf; color: var(--ok); }
    .node-pill.push-only, .node-pill.warning { background: #ffedc6; color: var(--warn); }
    .node-pill.heartbeat-degraded, .node-pill.offline, .run-pill.failed, .node-pill.error { background: #f6d7d4; color: var(--danger); }
    .node-pill.unpaired, .run-pill.running, .node-pill.info { background: #e6e5da; color: #555940; }
    .node-pill.disabled { background: #e2e2e2; color: #555; }
    .metric-meta { color: var(--muted); font-size: 13px; }
    .list { display: grid; gap: 12px; }
    .sparkline { width: 100%; height: 120px; margin-top: 12px; background: rgba(255,255,255,0.66); border-radius: 14px; }
    .lang-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    .lang-control select {
      width: auto;
      min-width: 132px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #c7d0ca;
      background: rgba(255,255,255,0.95);
      font: inherit;
      color: var(--ink);
    }
    .muted { color: var(--muted); }
    @media (max-width: 1150px) {
      .hero, .body-grid, .cards.three, .cards.two, .summary-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="panel">
        <div class="hero-head">
          <div class="status-badge" id="publicBadge" data-i18n="publicBadge">Public network board</div>
          <label class="lang-control" for="localeSelect">
            <span data-i18n="language">Language</span>
            <select id="localeSelect" aria-label="Language">
              <option value="zh-CN">中文</option>
              <option value="en-US">English</option>
            </select>
          </label>
        </div>
        <h1 id="heroTitle" data-i18n="heroTitle">mc-netprobe Public Network Quality</h1>
        <p id="heroDescription">
          这是公开查看页面，只展示当前网络质量、节点在线情况、近期告警和最近的监测结果。
          管理配置、节点配对和手动调度需要管理员登录后进入后台。
        </p>
        <div class="actions" style="margin-top:18px;">
          <a class="button-link primary" href="/admin" data-i18n="adminLogin">管理员登录</a>
          <button class="secondary" type="button" id="refreshBtn" data-i18n="refreshBoard">刷新看板</button>
        </div>
      </div>

      <div class="panel">
        <div class="split">
          <h2 data-i18n="summary">Summary</h2>
          <a id="latestReportLink" href="#" target="_blank" data-i18n="openLatestReport">Open latest report</a>
        </div>
        <div id="summaryGrid" class="summary-grid"></div>
      </div>
    </section>

    <section class="panel">
      <div class="split">
        <h2 data-i18n="nodes">Nodes</h2>
        <span class="muted" id="topologyName"></span>
      </div>
      <div id="nodesGrid" class="cards three"></div>
    </section>

    <section class="body-grid">
      <div class="panel">
        <h2 data-i18n="recentAlerts">Recent Alerts</h2>
        <div id="alertsList" class="list"></div>
      </div>

      <div class="panel">
        <h2 data-i18n="recentRuns">Recent Runs</h2>
        <div id="runsList" class="list"></div>
        <h2 style="margin-top:18px;" data-i18n="cpuTrend24h">CPU Trend (24h)</h2>
        <svg id="cpuTrend" class="sparkline" viewBox="0 0 600 120" preserveAspectRatio="none"></svg>
      </div>
    </section>
  </div>

  <script>
    const initialState = {{ initial_state_json }};
    let currentState = initialState;
    const LOCALE_STORAGE_KEY = "mc-netprobe-locale";
    const translations = {
      "zh-CN": {
        pageTitle: "mc-netprobe 公开网络看板",
        language: "语言",
        publicBadge: "公开网络看板",
        heroTitle: "mc-netprobe 公开网络质量",
        heroDescription: "这是公开查看页面，只展示当前网络质量、节点在线情况、近期告警和最近的监测结果。管理配置、节点配对和手动调度需要管理员登录后进入后台。",
        adminLogin: "管理员登录",
        refreshBoard: "刷新看板",
        summary: "总览",
        openLatestReport: "打开最新报告",
        nodes: "节点",
        recentAlerts: "最近告警",
        recentRuns: "最近运行",
        cpuTrend24h: "CPU 趋势（24 小时）",
        totalNodes: "节点总数",
        onlineNodes: "在线节点",
        degradedNodes: "降级节点",
        offlineNodes: "异常节点",
        activeAlerts: "当前告警",
        lastSeen: "最近上线",
        push: "Push",
        pull: "Pull",
        findings: "发现项",
        noAlerts: "暂无告警。",
        noRunsYet: "还没有运行记录。",
        noSummary: "暂无摘要",
        notAvailable: "无",
        min: "最小",
        max: "最大",
        bool: { true: "是", false: "否" },
        role: { client: "客户端", relay: "中继", server: "服务端" },
        status: {
          online: "在线",
          "push-only": "仅 Push",
          "heartbeat-degraded": "心跳降级",
          offline: "离线",
          unpaired: "未配对",
          disabled: "已禁用",
          running: "运行中",
          completed: "已完成",
          failed: "失败",
          error: "错误",
          warning: "警告",
          info: "信息",
          open: "未恢复",
          resolved: "已恢复",
        },
        alertKind: {
          threshold: "阈值",
          node_status: "节点状态",
          run_failed: "运行失败",
          offline: "离线",
          "data-gap": "数据缺失",
        },
        runKind: { system: "system", baseline: "baseline", capacity: "capacity", full: "full" },
      },
      "en-US": {
        pageTitle: "mc-netprobe public board",
        language: "Language",
        publicBadge: "Public network board",
        heroTitle: "mc-netprobe Public Network Quality",
        heroDescription: "This public page shows current network quality, node health, recent alerts, and recent monitoring results. Configuration, pairing, and manual runs require an admin login.",
        adminLogin: "Admin Login",
        refreshBoard: "Refresh Board",
        summary: "Summary",
        openLatestReport: "Open Latest Report",
        nodes: "Nodes",
        recentAlerts: "Recent Alerts",
        recentRuns: "Recent Runs",
        cpuTrend24h: "CPU Trend (24h)",
        totalNodes: "Total Nodes",
        onlineNodes: "Online Nodes",
        degradedNodes: "Degraded Nodes",
        offlineNodes: "Problem Nodes",
        activeAlerts: "Active Alerts",
        lastSeen: "Last Seen",
        push: "Push",
        pull: "Pull",
        findings: "findings",
        noAlerts: "No alerts.",
        noRunsYet: "No runs yet.",
        noSummary: "No summary",
        notAvailable: "n/a",
        min: "min",
        max: "max",
        bool: { true: "yes", false: "no" },
        role: { client: "Client", relay: "Relay", server: "Server" },
        status: {
          online: "Online",
          "push-only": "Push only",
          "heartbeat-degraded": "Heartbeat degraded",
          offline: "Offline",
          unpaired: "Unpaired",
          disabled: "Disabled",
          running: "Running",
          completed: "Completed",
          failed: "Failed",
          error: "Error",
          warning: "Warning",
          info: "Info",
          open: "Open",
          resolved: "Resolved",
        },
        alertKind: {
          threshold: "threshold",
          node_status: "node status",
          run_failed: "run failed",
          offline: "offline",
          "data-gap": "data gap",
        },
        runKind: { system: "system", baseline: "baseline", capacity: "capacity", full: "full" },
      },
    };
    let currentLocale = detectLocale();

    function $(id) { return document.getElementById(id); }

    function detectLocale() {
      const saved = window.localStorage.getItem(LOCALE_STORAGE_KEY);
      if (saved && translations[saved]) {
        return saved;
      }
      return navigator.language && navigator.language.toLowerCase().startsWith("zh") ? "zh-CN" : "en-US";
    }

    function lookup(locale, key) {
      return key.split(".").reduce((value, segment) => (
        value && typeof value === "object" ? value[segment] : undefined
      ), translations[locale]);
    }

    function t(key, vars = {}) {
      const template = lookup(currentLocale, key) ?? lookup("en-US", key) ?? key;
      return String(template).replace(/\{(\w+)\}/g, (_, token) => String(vars[token] ?? `{${token}}`));
    }

    function translateStatus(value) {
      return lookup(currentLocale, `status.${value}`) ?? lookup("en-US", `status.${value}`) ?? value;
    }

    function translateRole(value) {
      return lookup(currentLocale, `role.${value}`) ?? lookup("en-US", `role.${value}`) ?? value;
    }

    function translateRunKind(value) {
      return lookup(currentLocale, `runKind.${value}`) ?? lookup("en-US", `runKind.${value}`) ?? value;
    }

    function translateAlertKind(value) {
      return lookup(currentLocale, `alertKind.${value}`) ?? lookup("en-US", `alertKind.${value}`) ?? value;
    }

    function translateBool(value) {
      return t(`bool.${Boolean(value)}`);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function applyStaticTranslations() {
      document.documentElement.lang = currentLocale;
      document.title = t("pageTitle");
      $("heroDescription").textContent = t("heroDescription");
      document.querySelectorAll("[data-i18n]").forEach((element) => {
        element.textContent = t(element.dataset.i18n);
      });
    }

    function setLocale(locale) {
      if (!translations[locale]) {
        return;
      }
      currentLocale = locale;
      window.localStorage.setItem(LOCALE_STORAGE_KEY, locale);
      $("localeSelect").value = locale;
      applyStaticTranslations();
      renderDashboard(currentState);
    }

    function renderSummary(summary) {
      const cards = [
        ["totalNodes", summary.total_nodes || 0],
        ["onlineNodes", summary.online_nodes || 0],
        ["degradedNodes", summary.degraded_nodes || 0],
        ["offlineNodes", summary.offline_nodes || 0],
        ["activeAlerts", summary.active_alerts || 0],
      ];
      $("summaryGrid").innerHTML = cards.map(([key, value]) => `
        <article class="summary-card">
          <span class="muted">${t(key)}</span>
          <strong>${value}</strong>
        </article>
      `).join("");
    }

    function renderNodes(nodes) {
      $("nodesGrid").innerHTML = nodes.length ? nodes.map((node) => `
        <article class="node-card">
          <div class="split">
            <h3>${translateRole(node.role)}</h3>
            <span class="node-pill ${node.status}">${translateStatus(node.status)}</span>
          </div>
          <p>${escapeHtml(node.node_name)}</p>
          <div class="metric-meta" style="margin-top:10px;">
            <span>${t("lastSeen")}: ${escapeHtml(node.last_seen_at || t("notAvailable"))}</span>
            <span>${t("push")}: ${translateBool(node.last_push_ok)}</span>
            <span>${t("pull")}: ${translateBool(node.last_pull_ok)}</span>
          </div>
        </article>
      `).join("") : "";
    }

    function renderAlerts(alerts) {
      $("alertsList").innerHTML = alerts.length ? alerts.map((alert) => `
        <article class="alert-card">
          <div class="split">
            <strong>${translateAlertKind(alert.kind)}</strong>
            <span class="node-pill ${alert.severity === "error" ? "error" : alert.severity === "warning" ? "warning" : "info"}">${translateStatus(alert.severity)}</span>
          </div>
          <p style="margin-top:8px;">${escapeHtml(alert.message)}</p>
          <div class="metric-meta"><span>${escapeHtml(alert.created_at || "")}</span><span>${translateStatus(alert.status)}</span></div>
        </article>
      `).join("") : `<p class="muted">${t("noAlerts")}</p>`;
    }

    function renderRuns(runs) {
      $("runsList").innerHTML = runs.length ? runs.map((run) => `
        <article class="run-card">
          <div class="split">
            <strong>${translateRunKind(run.run_kind)}</strong>
            <span class="run-pill ${run.status}">${translateStatus(run.status)}</span>
          </div>
          <div class="metric-meta">
            <span>${escapeHtml(run.started_at || "")}</span>
            <span>${t("findings")}: ${run.findings_count || 0}</span>
          </div>
          <p style="margin-top:10px;">${escapeHtml((run.error || (run.conclusion && run.conclusion[0]) || t("noSummary")).toString())}</p>
          <div class="actions" style="margin-top:10px;">
            ${run.html_path ? `<a href="/${run.html_path}" target="_blank">report.html</a>` : ""}
          </div>
        </article>
      `).join("") : `<p class="muted">${t("noRunsYet")}</p>`;

      const latestCompleted = runs.find((item) => item.html_path);
      $("latestReportLink").href = latestCompleted ? `/${latestCompleted.html_path}` : "#";
    }

    function renderTrend(samples) {
      const svg = $("cpuTrend");
      if (!samples.length) {
        svg.innerHTML = "";
        return;
      }
      const values = samples.map((item) => Number(item.metric_value));
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = Math.max(1, max - min);
      const points = values.map((value, index) => {
        const x = (index / Math.max(1, values.length - 1)) * 600;
        const y = 110 - (((value - min) / span) * 90);
        return `${x},${y}`;
      }).join(" ");
      svg.innerHTML = `
        <rect x="0" y="0" width="600" height="120" rx="14" fill="rgba(255,255,255,0.78)"></rect>
        <polyline fill="none" stroke="#285943" stroke-width="3" points="${points}"></polyline>
        <text x="12" y="18" fill="#5e6b63" font-size="12">${t("min")} ${min.toFixed(1)}%</text>
        <text x="520" y="18" fill="#5e6b63" font-size="12">${t("max")} ${max.toFixed(1)}%</text>
      `;
    }

    function renderDashboard(state) {
      currentState = state;
      $("topologyName").textContent = state.topology_name || "";
      renderSummary(state.summary || {});
      renderNodes(state.nodes || []);
      renderAlerts(state.alerts || []);
      renderRuns(state.latest_runs || []);
      renderTrend((state.history && state.history.samples) || []);
    }

    async function refreshDashboard() {
      const response = await fetch("/api/v1/public-dashboard");
      const data = await response.json();
      renderDashboard(data);
    }

    $("refreshBtn").addEventListener("click", refreshDashboard);
    $("localeSelect").addEventListener("change", (event) => setLocale(event.target.value));

    setLocale(currentLocale);
    setInterval(refreshDashboard, 10000);
  </script>
</body>
</html>
