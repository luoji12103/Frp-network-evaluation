<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mc-netprobe panel</title>
  <style>
    :root {
      --bg: #edf1ea;
      --ink: #1f2b24;
      --muted: #5e6b63;
      --card: rgba(255, 255, 255, 0.88);
      --line: #c9d3cb;
      --accent: #285943;
      --accent-soft: #dce9e1;
      --warn: #935c15;
      --danger: #8e2e26;
      --ok: #24623f;
      --shadow: 0 18px 40px rgba(28, 42, 33, 0.09);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Aptos", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(40,89,67,0.15), transparent 26%),
        radial-gradient(circle at top right, rgba(147,92,21,0.14), transparent 24%),
        linear-gradient(180deg, #f8faf7 0%, var(--bg) 100%);
    }
    .shell { max-width: 1450px; margin: 0 auto; padding: 24px; display: grid; gap: 18px; }
    .hero, .body-grid { display: grid; gap: 18px; }
    .hero { grid-template-columns: 1.3fr 0.7fr; }
    .body-grid { grid-template-columns: 1.1fr 0.9fr; }
    .panel {
      background: var(--card);
      border: 1px solid rgba(201, 211, 203, 0.95);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 20px;
      backdrop-filter: blur(12px);
    }
    h1, h2, h3 { margin: 0; font-family: "Georgia", "Times New Roman", serif; font-weight: 600; }
    h1 { font-size: 34px; margin-bottom: 10px; }
    h2 { font-size: 24px; margin-bottom: 14px; }
    h3 { font-size: 19px; margin-bottom: 10px; }
    p { margin: 0; line-height: 1.5; color: var(--muted); }
    .top-actions, .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .top-actions { margin-top: 18px; }
    button {
      border: none; border-radius: 999px; padding: 11px 16px; font-weight: 700; cursor: pointer;
      transition: transform 0.15s ease;
    }
    button:hover { transform: translateY(-1px); }
    .primary { background: var(--accent); color: white; }
    .secondary { background: #e8eee8; color: var(--ink); }
    .danger { background: var(--danger); color: white; }
    .status-badge, .node-pill, .run-pill {
      display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 999px; font-weight: 700;
    }
    .status-badge { background: var(--accent-soft); color: var(--accent); margin-bottom: 14px; }
    .node-pill.online, .run-pill.completed { background: #d8eddf; color: var(--ok); }
    .node-pill.push-only { background: #ffedc6; color: var(--warn); }
    .node-pill.heartbeat-degraded { background: #f7ddd8; color: var(--danger); }
    .node-pill.offline, .run-pill.failed { background: #f6d7d4; color: var(--danger); }
    .node-pill.unpaired, .run-pill.running { background: #e6e5da; color: #555940; }
    .node-pill.disabled { background: #e2e2e2; color: #555; }
    .cards { display: grid; gap: 14px; }
    .cards.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cards.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .node-card, .run-card, .alert-card {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(240,245,240,0.62));
      padding: 16px;
    }
    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 12px;
    }
    label { display: grid; gap: 5px; font-size: 13px; color: var(--muted); }
    input, select {
      width: 100%;
      border: 1px solid #c7d0ca;
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      color: var(--ink);
      background: rgba(255,255,255,0.95);
    }
    .check { display: flex; align-items: center; gap: 8px; color: var(--ink); font-weight: 600; }
    .check input { width: 18px; height: 18px; padding: 0; }
    .metric-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; color: var(--muted); font-size: 13px; }
    .list { display: grid; gap: 12px; }
    .muted { color: var(--muted); }
    .split { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .message {
      border-radius: 14px;
      padding: 12px 14px;
      display: none;
      white-space: pre-wrap;
    }
    .message.show { display: block; }
    .message.ok { background: #d8eddf; color: var(--ok); }
    .message.error { background: #f6d7d4; color: var(--danger); }
    .message.warn { background: #ffedc6; color: var(--warn); }
    .command-box {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: #f4f7f3;
      border: 1px solid var(--line);
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .sparkline { width: 100%; height: 120px; margin-top: 12px; background: rgba(255,255,255,0.66); border-radius: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    @media (max-width: 1100px) {
      .hero, .body-grid, .cards.three, .cards.two, .field-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="panel">
        <div class="status-badge" id="panelStatus">Panel online</div>
        <h1>mc-netprobe Agent Panel</h1>
        <p>
          中央监控面板负责节点配对、持续调度、告警和历史趋势。节点自身只运行 Agent，
          不再通过 SSH 注入执行，也不在面板里保存任何系统凭据。
        </p>
        <div class="top-actions">
          <button class="primary" type="button" id="saveSettingsBtn">保存全局配置</button>
          <button class="danger" type="button" id="runFullBtn">手动执行完整监测</button>
          <button class="secondary" type="button" id="refreshBtn">刷新面板</button>
        </div>
        <div id="messageBox" class="message"></div>
      </div>
      <div class="panel">
        <h2>Recent Alerts</h2>
        <div id="alertsList" class="list"></div>
      </div>
    </section>

    <section class="panel">
      <div class="split">
        <h2>Nodes</h2>
        <span class="muted">一套拓扑，三个角色，底层模型可扩展</span>
      </div>
      <div id="nodesGrid" class="cards three"></div>
    </section>

    <section class="body-grid">
      <div class="panel">
        <h2>Topology, Thresholds & Schedules</h2>
        <div class="cards two">
          <div class="node-card">
            <h3>Service Endpoints</h3>
            <div class="field-grid">
              <label>relay_probe host<input id="relay_probe_host" type="text"></label>
              <label>relay_probe port<input id="relay_probe_port" type="number"></label>
              <label>mc_public host<input id="mc_public_host" type="text"></label>
              <label>mc_public port<input id="mc_public_port" type="number"></label>
              <label>iperf_public host<input id="iperf_public_host" type="text"></label>
              <label>iperf_public port<input id="iperf_public_port" type="number"></label>
              <label>mc_local host<input id="mc_local_host" type="text"></label>
              <label>mc_local port<input id="mc_local_port" type="number"></label>
              <label>iperf_local host<input id="iperf_local_host" type="text"></label>
              <label>iperf_local port<input id="iperf_local_port" type="number"></label>
            </div>
          </div>
          <div class="node-card">
            <h3>Thresholds & Durations</h3>
            <div class="field-grid">
              <label>Ping avg max ms<input id="ping_rtt_avg_max" type="number" step="0.1"></label>
              <label>Ping jitter max ms<input id="ping_jitter_max" type="number" step="0.1"></label>
              <label>TCP avg max ms<input id="tcp_connect_avg_max" type="number" step="0.1"></label>
              <label>TCP error max %<input id="tcp_timeout_error_max" type="number" step="0.1"></label>
              <label>Throughput up min Mbps<input id="throughput_up_min" type="number" step="0.1"></label>
              <label>Throughput down min Mbps<input id="throughput_down_min" type="number" step="0.1"></label>
              <label>Load delta max ms<input id="load_delta_max" type="number" step="0.1"></label>
              <label>System CPU max %<input id="system_cpu_max" type="number" step="0.1"></label>
              <label>Throughput duration sec<input id="throughput_duration_sec" type="number"></label>
              <label>Load duration sec<input id="load_duration_sec" type="number"></label>
              <label>TCP attempts<input id="tcp_attempts" type="number"></label>
              <label>System sample sec<input id="system_sample_sec" type="number" step="0.1"></label>
            </div>
            <div id="scheduleMeta" class="metric-meta"></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="split">
          <h2>Recent Runs</h2>
          <a id="latestReportLink" href="#" target="_blank">Open latest report</a>
        </div>
        <div id="runsList" class="list"></div>
        <h2 style="margin-top:18px;">CPU Trend (24h)</h2>
        <svg id="cpuTrend" class="sparkline" viewBox="0 0 600 120" preserveAspectRatio="none"></svg>
      </div>
    </section>
  </div>

  <script>
    const initialState = {{ initial_state_json }};
    let currentState = initialState;

    function $(id) { return document.getElementById(id); }

    function showMessage(kind, text) {
      const box = $("messageBox");
      box.className = `message show ${kind}`;
      box.textContent = text;
    }

    function nodeCard(role, node) {
      const status = node ? node.status : "unpaired";
      const nodeId = node ? node.id : "";
      const name = node ? node.node_name : role;
      const runtime = node ? node.runtime_mode : defaultRuntime(role);
      const agentUrl = node ? (node.agent_url || "") : "";
      const enabled = node ? Boolean(node.enabled) : true;
      const paired = node ? Boolean(node.paired) : false;
      const lastSeen = node && node.last_seen_at ? node.last_seen_at : "never";
      return `
        <article class="node-card" data-role="${role}" data-node-id="${nodeId}">
          <div class="split">
            <h3>${role.toUpperCase()}</h3>
            <span class="node-pill ${status}">${status}</span>
          </div>
          <div class="field-grid" style="margin-top:12px;">
            <label>Node name<input data-field="node_name" type="text" value="${escapeHtml(name)}"></label>
            <label>Runtime
              <select data-field="runtime_mode">
                ${["docker-linux","native-macos","native-windows"].map((item) => `<option value="${item}" ${item === runtime ? "selected" : ""}>${item}</option>`).join("")}
              </select>
            </label>
            <label>Agent URL<input data-field="agent_url" type="text" value="${escapeHtml(agentUrl)}" placeholder="http://host:9870"></label>
            <label class="check"><input data-field="enabled" type="checkbox" ${enabled ? "checked" : ""}>Enabled</label>
          </div>
          <div class="metric-meta">
            <span>paired: ${paired}</span>
            <span>last seen: ${lastSeen}</span>
            <span>push: ${node ? node.last_push_ok : false}</span>
            <span>pull: ${node ? node.last_pull_ok : false}</span>
          </div>
          <div class="actions" style="margin-top:12px;">
            <button class="primary" type="button" onclick="saveNode('${role}')">保存节点</button>
            <button class="secondary" type="button" onclick="pairNode('${role}')" ${!nodeId ? "disabled" : ""}>生成配对命令</button>
          </div>
          <div id="pair_${role}" class="command-box" style="display:none;"></div>
        </article>
      `;
    }

    function defaultRuntime(role) {
      if (role === "relay") return "docker-linux";
      if (role === "server") return "native-macos";
      return "native-windows";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function fillSettings(settings, schedules) {
      const s = settings.services;
      $("relay_probe_host").value = s.relay_probe.host || "";
      $("relay_probe_port").value = s.relay_probe.port;
      $("mc_public_host").value = s.mc_public.host || "";
      $("mc_public_port").value = s.mc_public.port;
      $("iperf_public_host").value = s.iperf_public.host || "";
      $("iperf_public_port").value = s.iperf_public.port;
      $("mc_local_host").value = s.mc_local.host || "";
      $("mc_local_port").value = s.mc_local.port;
      $("iperf_local_host").value = s.iperf_local.host || "";
      $("iperf_local_port").value = s.iperf_local.port;

      $("ping_rtt_avg_max").value = settings.thresholds.ping.rtt_avg_ms_max;
      $("ping_jitter_max").value = settings.thresholds.ping.jitter_ms_max;
      $("tcp_connect_avg_max").value = settings.thresholds.tcp.connect_avg_ms_max;
      $("tcp_timeout_error_max").value = settings.thresholds.tcp.timeout_or_error_pct_max;
      $("throughput_up_min").value = settings.thresholds.throughput.throughput_up_mbps_min;
      $("throughput_down_min").value = settings.thresholds.throughput.throughput_down_mbps_min;
      $("load_delta_max").value = settings.thresholds.load_inflation.load_rtt_inflation_ms_max;
      $("system_cpu_max").value = settings.thresholds.system.cpu_usage_pct_max;

      $("throughput_duration_sec").value = settings.scenarios.throughput.duration_sec;
      $("load_duration_sec").value = settings.scenarios.load_inflation.duration_sec;
      $("tcp_attempts").value = settings.scenarios.tcp.attempts;
      $("system_sample_sec").value = settings.scenarios.system.sample_interval_sec;
      $("scheduleMeta").innerHTML = schedules.map((item) => `<span>${item.run_kind}: every ${item.interval_sec}s</span>`).join("");
    }

    function collectSettings() {
      return {
        topology_name: currentState.settings.topology_name,
        services: {
          relay_probe: { host: $("relay_probe_host").value.trim(), port: Number($("relay_probe_port").value) },
          mc_public: { host: $("mc_public_host").value.trim(), port: Number($("mc_public_port").value) },
          iperf_public: { host: $("iperf_public_host").value.trim(), port: Number($("iperf_public_port").value) },
          mc_local: { host: $("mc_local_host").value.trim(), port: Number($("mc_local_port").value) },
          iperf_local: { host: $("iperf_local_host").value.trim(), port: Number($("iperf_local_port").value) },
        },
        thresholds: {
          ping: {
            packet_loss_pct_max: currentState.settings.thresholds.ping.packet_loss_pct_max,
            rtt_avg_ms_max: Number($("ping_rtt_avg_max").value),
            rtt_p95_ms_max: currentState.settings.thresholds.ping.rtt_p95_ms_max,
            jitter_ms_max: Number($("ping_jitter_max").value),
          },
          tcp: {
            connect_avg_ms_max: Number($("tcp_connect_avg_max").value),
            connect_p95_ms_max: currentState.settings.thresholds.tcp.connect_p95_ms_max,
            timeout_or_error_pct_max: Number($("tcp_timeout_error_max").value),
          },
          throughput: {
            throughput_up_mbps_min: Number($("throughput_up_min").value),
            throughput_down_mbps_min: Number($("throughput_down_min").value),
          },
          load_inflation: {
            load_rtt_inflation_ms_max: Number($("load_delta_max").value),
            loaded_timeout_pct_max: currentState.settings.thresholds.load_inflation.loaded_timeout_pct_max,
          },
          system: {
            cpu_usage_pct_max: Number($("system_cpu_max").value),
            memory_usage_pct_max: currentState.settings.thresholds.system.memory_usage_pct_max,
          }
        },
        scenarios: {
          ping: currentState.settings.scenarios.ping,
          tcp: {
            ...currentState.settings.scenarios.tcp,
            attempts: Number($("tcp_attempts").value),
          },
          throughput: {
            ...currentState.settings.scenarios.throughput,
            duration_sec: Number($("throughput_duration_sec").value),
          },
          system: {
            ...currentState.settings.scenarios.system,
            sample_interval_sec: Number($("system_sample_sec").value),
          },
          load_inflation: {
            ...currentState.settings.scenarios.load_inflation,
            duration_sec: Number($("load_duration_sec").value),
          }
        }
      };
    }

    async function saveSettings() {
      const response = await fetch("/api/v1/dashboard", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(collectSettings()),
      });
      const data = await response.json();
      if (!response.ok) {
        showMessage("error", data.detail || data.error || "Failed to save settings");
        return;
      }
      showMessage("ok", "Global settings saved.");
      await refreshDashboard();
    }

    async function saveNode(role) {
      const card = document.querySelector(`[data-role="${role}"]`);
      const nodeId = card.getAttribute("data-node-id");
      const payload = {
        id: nodeId ? Number(nodeId) : null,
        node_name: card.querySelector('[data-field="node_name"]').value.trim(),
        role,
        runtime_mode: card.querySelector('[data-field="runtime_mode"]').value,
        agent_url: card.querySelector('[data-field="agent_url"]').value.trim() || null,
        enabled: card.querySelector('[data-field="enabled"]').checked,
      };
      const response = await fetch("/api/v1/nodes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await response.json();
      if (!response.ok) {
        showMessage("error", data.detail || data.error || "Failed to save node");
        return;
      }
      showMessage("ok", `${role} node saved.`);
      await refreshDashboard();
    }

    async function pairNode(role) {
      const card = document.querySelector(`[data-role="${role}"]`);
      const nodeId = card.getAttribute("data-node-id");
      if (!nodeId) {
        showMessage("warn", "Save the node before generating a pair code.");
        return;
      }
      const response = await fetch(`/api/v1/nodes/${nodeId}/pair-code`, { method: "POST" });
      const data = await response.json();
      if (!response.ok) {
        showMessage("error", data.detail || data.error || "Failed to create pair code");
        return;
      }
      const target = $(`pair_${role}`);
      target.style.display = "block";
      target.textContent = `Pair code: ${data.pair_code}\nExpires: ${data.expires_at}\n\nPrimary:\n${data.startup_command}\n\nFallback:\n${data.fallback_command || "n/a"}`;
      showMessage("ok", `${role} pair command generated.`);
    }

    async function runFull() {
      const response = await fetch("/api/v1/runs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ run_kind: "full", source: "manual" }),
      });
      const data = await response.json();
      if (!response.ok) {
        showMessage("error", data.detail || data.error || "Failed to trigger run");
        return;
      }
      showMessage("ok", `Run ${data.run_id} started.`);
      await refreshDashboard();
    }

    function renderRuns(runs) {
      const target = $("runsList");
      target.innerHTML = runs.length ? runs.map((run) => `
        <article class="run-card">
          <div class="split">
            <strong>${run.run_kind}</strong>
            <span class="run-pill ${run.status}">${run.status}</span>
          </div>
          <div class="metric-meta">
            <span>${run.started_at}</span>
            <span>findings: ${run.findings_count || 0}</span>
          </div>
          <p style="margin-top:10px;">${(run.error || (run.conclusion && run.conclusion[0]) || "No summary").toString()}</p>
          <div class="actions" style="margin-top:10px;">
            ${run.html_path ? `<a href="/${run.html_path}" target="_blank">report.html</a>` : ""}
            ${run.raw_path ? `<a href="/${run.raw_path}" target="_blank">raw.json</a>` : ""}
          </div>
        </article>
      `).join("") : `<p class="muted">No runs yet.</p>`;

      const latestCompleted = runs.find((item) => item.html_path);
      $("latestReportLink").href = latestCompleted ? `/${latestCompleted.html_path}` : "#";
    }

    function renderAlerts(alerts) {
      const target = $("alertsList");
      target.innerHTML = alerts.length ? alerts.map((alert) => `
        <article class="alert-card">
          <div class="split">
            <strong>${alert.kind}</strong>
            <span class="node-pill ${alert.severity === "error" ? "offline" : "push-only"}">${alert.severity}</span>
          </div>
          <p style="margin-top:8px;">${escapeHtml(alert.message)}</p>
          <div class="metric-meta"><span>${alert.created_at}</span><span>${alert.status}</span></div>
        </article>
      `).join("") : `<p class="muted">No alerts.</p>`;
    }

    function renderTrend(samples) {
      const svg = $("cpuTrend");
      if (!samples.length) {
        svg.innerHTML = "";
        return;
      }
      const values = samples.map((item) => Number(item.metric_value));
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = Math.max(1, max - min);
      const points = values.map((value, index) => {
        const x = (index / Math.max(1, values.length - 1)) * 600;
        const y = 110 - (((value - min) / span) * 90);
        return `${x},${y}`;
      }).join(" ");
      svg.innerHTML = `
        <rect x="0" y="0" width="600" height="120" rx="14" fill="rgba(255,255,255,0.78)"></rect>
        <polyline fill="none" stroke="#285943" stroke-width="3" points="${points}"></polyline>
        <text x="12" y="18" fill="#5e6b63" font-size="12">min ${min.toFixed(1)}%</text>
        <text x="520" y="18" fill="#5e6b63" font-size="12">max ${max.toFixed(1)}%</text>
      `;
    }

    function renderNodes(nodes) {
      const map = Object.fromEntries(nodes.map((node) => [node.role, node]));
      $("nodesGrid").innerHTML = ["client", "relay", "server"].map((role) => nodeCard(role, map[role] || null)).join("");
    }

    function renderDashboard(state) {
      currentState = state;
      renderNodes(state.nodes || []);
      fillSettings(state.settings, state.schedules || []);
      renderRuns(state.latest_runs || []);
      renderAlerts(state.alerts || []);
      renderTrend((state.history && state.history.samples) || []);
    }

    async function refreshDashboard() {
      const response = await fetch("/api/v1/dashboard");
      const data = await response.json();
      renderDashboard(data);
    }

    $("saveSettingsBtn").addEventListener("click", saveSettings);
    $("runFullBtn").addEventListener("click", runFull);
    $("refreshBtn").addEventListener("click", refreshDashboard);

    renderDashboard(initialState);
    setInterval(refreshDashboard, 10000);
  </script>
</body>
</html>
